<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HireHub</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>

    <div class="logo">HireHub</div>

    <nav>

        <a href="index.html">Home</a>
        <a href="jobs.html">Jobs</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>

    </nav>

</header>

<section class="auth-container">

    <div class="auth-left">

        <h1>Welcome Back!</h1>

        <p>

            Login to your account and continue your placement journey with HireHub.

        </p>

        <img src="images/login.svg" alt="Login Illustration" class="register-image">

    </div>

    <div class="auth-right">

        <form class="auth-form">

            <h2>Login</h2>

            <input type="email" placeholder="Email Address" required>

            <input type="password" placeholder="Password" required>

            <div class="login-options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button type="submit" class="register-btn">

                Login

            </button>

            <p class="switch-page">

                Don't have an account?

                <a href="register.html">Register</a>

            </p>

        </form>

    </div>

</section>

<footer>

    © 2026 HireHub | Designed by Riya Sen Gupta

</footer>

</body>

</html>
