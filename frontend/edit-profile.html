<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Profile | HireHub</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">HireHub</div>

    <nav>

        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profile</a>

    </nav>

</header>

<section class="edit-profile">

    <h1>Edit Profile</h1>

    <div class="edit-card">

        <img src="images/profile.svg" alt="Profile" class="edit-profile-img">

        <button type="button" class="change-photo-btn">
        Change Profile Picture
        </button>

        <form>

            <label>Full Name</label>
            <input type="text" value="Riya Sen Gupta">

            <label>Email</label>
            <input type="email" value="kakolisengupta595@gmail.com">

            <label>Phone</label>
            <input type="text" placeholder="Enter Phone Number">

            <label>College</label>
            <input type="text" value="GLA University">

            <label>Course</label>
            <input type="text" value="B.Tech Computer Science">

            <label>Location</label>
            <input type="text" value="Varanasi">

            <label>Skills</label>
            <input type="text" value="HTML, CSS, JavaScript, Node.js">

            <label>Languages</label>
            <input type="text" value="English, Hindi">

            <label>About Me</label>

            <textarea rows="5">Passionate Computer Science student interested in Full Stack Development.</textarea>

            <button type="submit" class="save-btn">
                Save Changes
            </button>

            <button type="reset" class="cancel-btn">
            Cancel
            </button>

        </form>

    </div>

</section>

<footer>

    <p>© 2026 HireHub | Designed by Riya Sen Gupta</p>

</footer>

</body>

</html>
